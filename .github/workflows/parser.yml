name: Parser

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:
    inputs:
      per_feed:
        description: "Max items to pull per direct feed"
        required: false
        default: "40"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: parser
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Fetch feeds
        id: parse
        env:
          PER_FEED: ${{ github.event.inputs.per_feed || '40' }}
        run: node scripts/parse.mjs

      - name: Open / update review PR
        if: steps.parse.outputs.added != '0' && steps.parse.outputs.added != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="parser/auto-update"
          git checkout -B "$BRANCH"
          git add data/approved.json data/seen.json data/feed-health.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore(parser): ${{ steps.parse.outputs.added }} new UK headlines for review"
          git push -f origin "$BRANCH"
          if gh pr view "$BRANCH" --json state --jq .state 2>/dev/null | grep -q OPEN; then
            echo "PR already open; updated branch."
          else
            gh pr create \
              --base main --head "$BRANCH" \
              --title "Parser: new UK headlines for review" \
              --body "Automated fetch added **${{ steps.parse.outputs.added }}** new headline(s) to \`data/approved.json\`.

          **To approve:** merge this PR (the merge publishes them).
          **To reject items:** delete their entries from the \`data/approved.json\` diff before merging — \`data/seen.json\` keeps them from being re-added.
          **To re-rank / feature:** edit the item's \`priority\` (p1/p2/p3) or \`featured\` in the diff.

          _Generated by the Parser workflow._"
          fi
